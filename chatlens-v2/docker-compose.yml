version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatlens_postgres
    environment:
      POSTGRES_USER: chatlens
      POSTGRES_PASSWORD: chatlens_password
      POSTGRES_DB: chatlens_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chatlens_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
